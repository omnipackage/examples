version_extractors:
  - name: version_file
    provider: 'file'
    file:
      file: 'version.h'
      regex: 'VERSION "(.+)"'

common: &common
  project_name: 'Example C Makefile'
  package_name: 'omnipackage-example-c-2'
  maintainer: 'Chuck Norris <chuck@norr.is>'
  homepage: https://omnipackage.org/
  description: Example C project built with OmniPackage

repositories:
  - name: Local test
    gpg_private_key_base64: "${GPG_KEY}"
    provider: localfs
    <<: *common
    localfs:
      path: /tmp/omnipackage-repos

  - name: Example bucket
    provider: s3
    gpg_private_key_base64: "${GPG_KEY}"
    <<: *common
    s3:
      bucket: example-bucket
      path_in_bucket: 'examples/c_makefile-2'
      bucket_public_url: 'https://example-bucket.your-domain.com' # set if your bucket is connected to domain
      endpoint: 'https://s3 enpoint url ...'
      access_key_id: '${ACCESS_KEY_ID}'
      secret_access_key: '${SECRET_ACCESS_KEY}'
      region: auto
      force_path_style: true

rpm: &rpm
  <<: *common
  build_dependencies: ['gcc', 'make']
  rpm:
    spec_template: '.omnipackage/specfile.spec.liquid'

deb: &deb
  <<: *common
  build_dependencies: ['build-essential']
  deb:
    debian_templates: '.omnipackage/deb'

builds:
