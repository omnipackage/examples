version_extractors:
  - name: versionrb
    provider: "file"
    file:
      file: "lib/omnipackage_example_ruby/version.rb"
      regex: 'VERSION = "(.+)"'

common: &common
  package_name: omnipackage-example-ruby
  maintainer: "Chuck Norris <chuck@norr.is>"
  homepage: https://omnipackage.org/
  description: Example Ruby project built with OmniPackage

repositories:
  - name: Local test
    gpg_private_key_base64: "${GPG_KEY}"
    provider: localfs
    <<: *common
    localfs:
      path: "${HOME}/omnipackage-examples-repos/ruby"

  - name: Example bucket
    provider: s3
    gpg_private_key_base64: "${GPG_KEY}"
    <<: *common
    s3:
      bucket: example-bucket
      path_in_bucket: "examples/ruby"
      bucket_public_url: "https://example-bucket.your-domain.com" # set if your bucket is connected to domain
      endpoint: "https://s3 enpoint url ..."
      access_key_id: "${ACCESS_KEY_ID}"
      secret_access_key: "${SECRET_ACCESS_KEY}"
      region: auto
      force_path_style: true

rpm: &rpm
  <<: *common
  build_dependencies: ["ruby-devel"]
  runtime_dependencies: ["ruby"]
  rpm:
    spec_template: ".omnipackage/specfile.spec.liquid"

deb: &deb
  <<: *common
  build_dependencies: ["ruby-dev", "ruby-bundler"]
  runtime_dependencies: ["ruby", "ruby-bundler"]
  deb:
    debian_templates: ".omnipackage/deb"

builds:
  - distro: "opensuse_15.3"
    <<: *rpm
    build_dependencies:
      [
        "gcc",
        "make",
        "libopenssl-devel",
        "libyaml-devel",
        "zlib-devel",
        "libffi-devel",
        "gmp-devel",
      ]
    runtime_dependencies: []
    before_build_script: ".omnipackage/install_ruby.sh"

