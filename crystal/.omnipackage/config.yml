version_extractors:
  - name: shards_file
    provider: "file"
    file:
      file: "shard.yml"
      regex: "version: (.+)"

common: &common
  package_name: omnipackage-example-crystal
  maintainer: "Chuck Norris <chuck@norr.is>"
  homepage: https://omnipackage.org/
  description: Example Crystal project built with OmniPackage

repositories:
  - name: Local test
    gpg_private_key_base64: "${GPG_KEY}"
    provider: localfs
    <<: *common
    localfs:
      path: "${HOME}/omnipackage-examples-repos/crystal"

  - name: Example bucket
    provider: s3
    gpg_private_key_base64: "${GPG_KEY}"
    <<: *common
    s3:
      bucket: example-bucket
      path_in_bucket: "examples/crystal"
      bucket_public_url: "https://example-bucket.your-domain.com" # set if your bucket is connected to domain
      endpoint: "https://s3 enpoint url ..."
      access_key_id: "${ACCESS_KEY_ID}"
      secret_access_key: "${SECRET_ACCESS_KEY}"
      region: auto
      force_path_style: true

rpm: &rpm
  <<: *common
  rpm:
    spec_template: ".omnipackage/specfile.spec.liquid"
  build_dependencies: ["curl", "pcre-devel", "libevent-devel", "gcc"]
  before_build_script: ".omnipackage/install_crystal.sh"

deb: &deb
  <<: *common
  deb:
    debian_templates: ".omnipackage/deb"
  build_dependencies: ["curl", "libpcre2-dev", "libevent-dev"]
  before_build_script: ".omnipackage/install_crystal.sh"

builds:
  - distro: "opensuse_15.3"
    <<: *rpm

  - distro: "opensuse_15.4"
    <<: *rpm

  - distro: "opensuse_15.5"
    <<: *rpm

  - distro: "opensuse_15.6"
    <<: *rpm

  - distro: "opensuse_16.0"
    <<: *rpm

  - distro: "opensuse_tumbleweed"
    <<: *rpm
    build_dependencies: ["curl", "pcre2-devel", "libevent-devel", "gcc"]

  - distro: "fedora_38"
    <<: *rpm

  - distro: "fedora_39"
    <<: *rpm

  - distro: "fedora_40"
    <<: *rpm

  - distro: "fedora_41"
    <<: *rpm

  - distro: "fedora_42"
    <<: *rpm

  - distro: "fedora_43"
    <<: *rpm

  - distro: "fedora_44"
    <<: *rpm

  - distro: "fedora_rawhide"
    <<: *rpm
    build_dependencies: ["curl", "pcre2-devel", "libevent-devel", "gcc"]

  - distro: "debian_11"
    <<: *deb

  - distro: "debian_12"
    <<: *deb

  - distro: "debian_13"
