version_extractors:
  - name: cargo_toml_file
    provider: "file"
    file:
      file: "Cargo.toml"
      regex: 'version = "(.+)"'

common: &common
  package_name: omnipackage-example-rust
  maintainer: "Chuck Norris <chuck@norr.is>"
  homepage: https://omnipackage.org/
  description: Example Rust project built with OmniPackage

repositories:
  - name: Local test
    gpg_private_key_base64: "${GPG_KEY}"
    provider: localfs
    <<: *common
    localfs:
      path: "${HOME}/omnipackage-examples-repos/rust"

  - name: Example bucket
    provider: s3
    gpg_private_key_base64: "${GPG_KEY}"
    <<: *common
    s3:
      bucket: example-bucket
      path_in_bucket: "examples/rust"
      bucket_public_url: "https://example-bucket.your-domain.com" # set if your bucket is connected to domain
      endpoint: "https://s3 enpoint url ..."
      access_key_id: "${ACCESS_KEY_ID}"
      secret_access_key: "${SECRET_ACCESS_KEY}"
      region: auto
      force_path_style: true

rpm: &rpm
  <<: *common
  rpm:
    spec_template: ".omnipackage/specfile.spec.liquid"

deb: &deb
  <<: *common
  deb:
    debian_templates: ".omnipackage/deb"

builds:
