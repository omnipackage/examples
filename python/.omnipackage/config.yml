version_extractors:
  - name: mainpyfile
    provider: "file"
    file:
      file: "main.py"
      regex: 'VERSION = "(.+)"'

common: &common
  package_name: omnipackage-example-python
  maintainer: "Chuck Norris <chuck@norr.is>"
  homepage: https://omnipackage.org/
  description: Example Python project built with OmniPackage

repositories:
  - name: Local test
    gpg_private_key_base64: "${GPG_KEY}"
    provider: localfs
    <<: *common
    localfs:
      path: "${HOME}/omnipackage-examples-repos/python"

  - name: Example bucket
    provider: s3
    gpg_private_key_base64: "${GPG_KEY}"
    <<: *common
    s3:
      bucket: example-bucket
      path_in_bucket: "examples/python"
      bucket_public_url: "https://example-bucket.your-domain.com" # set if your bucket is connected to domain
      endpoint: "https://s3 enpoint url ..."
      access_key_id: "${ACCESS_KEY_ID}"
      secret_access_key: "${SECRET_ACCESS_KEY}"
      region: auto
      force_path_style: true

rpm: &rpm
  <<: *common
  build_dependencies: ["python3-devel", "python3-pip"]
  runtime_dependencies: ["python3"]
  rpm:
    spec_template: ".omnipackage/specfile.spec.liquid"

deb: &deb
  <<: *common
  build_dependencies: ["python3-dev", "python3-pip"]
  runtime_dependencies: ["python3"]
  deb:
    debian_templates: ".omnipackage/deb"

builds:
  - distro: "opensuse_15.3"
    <<: *rpm

  - distro: "opensuse_15.4"
    <<: *rpm

  - distro: "opensuse_15.5"
    <<: *rpm

  - distro: "opensuse_15.6"
    <<: *rpm

  - distro: "opensuse_16.0"
    <<: *rpm

  - distro: "opensuse_tumbleweed"
    <<: *rpm

  - distro: "fedora_38"
    <<: *rpm

  - distro: "fedora_39"
    <<: *rpm

  - distro: "fedora_40"
    <<: *rpm

  - distro: "fedora_41"
    <<: *rpm

  - distro: "fedora_42"
    <<: *rpm

  - distro: "fedora_43"
    <<: *rpm

  - distro: "fedora_44"
    <<: *rpm

  - distro: "fedora_rawhide"
    <<: *rpm

  - distro: "debian_11"
    <<: *deb
    before_build_script: ".omnipackage/install_python.sh"
    build_dependencies:
      [
        build-essential,
        gdb,
        lcov,
        pkg-config,
        libbz2-dev,
        libffi-dev,
        libgdbm-dev,
        libgdbm-compat-dev,
        liblzma-dev,
        libncurses5-dev,
        libreadline6-dev,
        libsqlite3-dev,
        libssl-dev,
        lzma,
        lzma-dev,
        tk-dev,
        uuid-dev,
        zlib1g-dev,
      ]
    runtime_dependencies: []

  - distro: "debian_12"
    <<: *deb

  - distro: "debian_13"
    <<: *deb

  - distro: "debian_testing"
    <<: *deb

  - distro: "debian_unstable"
    <<: *deb

  - distro: "ubuntu_20.04"
    <<: *deb

  - distro: "ubuntu_22.04"
    <<: *deb

  - distro: "ubuntu_24.04"
    <<: *deb

  - distro: "ubuntu_25.04"
    <<: *deb

  - distro: "ubuntu_26.04"
    <<: *deb

  - distro: "almalinux_8"
    <<: *rpm

  - distro: "almalinux_9"
    <<: *rpm

  - distro: "almalinux_10"
    <<: *rpm

  - distro: "rockylinux_8"
    <<: *rpm

  - distro: "rockylinux_9"
    <<: *rpm

  - distro: "mageia_9"
    <<: *rpm

  - distro: "mageia_cauldron"
    <<: *rpm
